name: End-to-end Workflow

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - ".github/workflows/accounts-e2e.yml"
      - ".github/workflows/_dependencies.yml"
      - ".github/workflows/_e2e-tests.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  test-e2e-chromium:
    uses: ./.github/workflows/_e2e-tests.yml
    with:
      browser-name: chromium
      projects: --project=chromium
      timeout-minutes: 25

  test-e2e-other-browser:
    needs: test-e2e-chromium
    uses: ./.github/workflows/_e2e-tests.yml
    with:
      browser-name: other-browser
      projects: --project=firefox --project=webkit
      timeout-minutes: 30
