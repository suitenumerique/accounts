server {
  listen 8080;
  listen 3000;
  server_name localhost;

  server_tokens off;

  root /app;

  add_header X-Frame-Options DENY always;

  location / {
    try_files $uri index.html $uri/ =404;
  }

  error_page 404 /404.html;
  location = /404.html {
    internal;
  }

  # Without this, the .mjs file is served as application/octet-stream
  # which breaks ES modules
  location ~* \.mjs$ {
    types { application/javascript mjs; }
    try_files $uri =404;
  }
}
